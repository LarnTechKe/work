name: WebUI CI Pipeline

on:
  push:
    branches:
      - "master"

jobs:
  build_and_push_to_docker_registry:
    name: Build and Push to Docker Registry
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.24.1"

      - name: Build
        run: go build -v ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set env
        run: echo "NOW=$(date +'%Y.%m.%d.%H.%M')" >> $GITHUB_ENV

      - name: Build and push
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/work-webui:v${{ env.NOW }} \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/work-webui:latest \
          -f Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/work-webui:v${{ env.NOW }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/work-webui:latest

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.NOW }}
          release_name: Release v${{ env.NOW }}
          body: |
            Changes in this Release
            - WebUI Deployment
          draft: false
          prerelease: false
