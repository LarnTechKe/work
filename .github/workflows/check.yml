name: Check

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  go:
    name: Go Build, Vet & Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.24.1"

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Benchmarks
        run: go test -bench=. -benchmem -benchtime=1s -run=^$ ./...

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webui/frontend

      - name: Type check
        run: npx tsc -b --noEmit
        working-directory: webui/frontend

      - name: Build
        run: npm run build
        working-directory: webui/frontend
